{{ define "main" }}
<style>
  .resume {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  .resume h1 {
    text-align: center;
    margin-bottom: 2rem;
  }
  .resume h2 {
    color: #3b82f6;
    border-bottom: 2px solid #3b82f6;
    padding-bottom: 0.5rem;
    margin-top: 2rem;
  }
  .resume ul {
    list-style: none;
    padding-left: 0;
  }
  .resume li {
    padding: 0.3rem 0;
  }
  .resume a {
    color: #3b82f6;
    text-decoration: none;
  }
  .resume a:hover {
    text-decoration: underline;
  }
  .resume strong {
    color: #fff;
  }
  .resume hr {
    border: none;
    border-top: 1px solid #333;
    margin: 1.5rem 0;
  }
</style>
<div class="resume">
  {{ .Content }}
</div>
{{ end }}
